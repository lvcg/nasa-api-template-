<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="description" content="A simple Picture of the Day app using NASA's API">
    <meta name="keywords" content="NASA, API, Picture of the Day, Astronomy, Space">

    <h1>🚀 NASA Astronomy Picture of the Day</h1>

    <!-- external CSS link -->
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <main class="container">

  <header>
    <h1>🚀 NASA Astronomy Picture of the Day</h1>
    <p>
      Explore NASA's daily featured image and story.
    </p>
  </header>

  <section class="controls">
    <label for="media-date">
      Select a Date
    </label>

    <input type="date" id="media-date">

    <button>
      View NASA Media
    </button>
  </section>

  <section class="media-display">

    <div id="loading" hidden>
      Loading...
    </div>

    <img
      id="nasa-media"
      hidden
      alt="NASA Media">

    <iframe
      id="nasa-video"
      hidden
      title="NASA Video">
    </iframe>

    <h2 id="media-title"></h2>

    <div id="media-explanation"></div>

  </section>

  <footer>
    Powered by NASA Open APIs
  </footer>

</main>
</html>
