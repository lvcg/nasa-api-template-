<!DOCTYPE html>

<html lang="en">

<head>
  <!-- Character encoding -->
  <meta charset="UTF-8">

  <!-- Responsive viewport settings -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Search engine description -->

<meta
 name="description"
 content="Explore NASA's Astronomy Picture of the Day.">

  <!-- Search engine keywords -->

<meta
 name="keywords"
 content="NASA, APOD, Astronomy, Space, API">

  <!-- Browser tab title -->

  <title>NASA Astronomy Picture of the Day</title>

  <!-- CSS Files -->

  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- Main application container -->

  <main class="container">

```
<!-- ==========================================
     HERO SECTION
     ========================================== -->

<header class="hero glass-card">

  <!-- Main application title -->
  <h1>🚀 NASA Astronomy Picture of the Day</h1>

  <!-- Application description -->
  <p class="intro">
    Explore NASA's daily featured images and stories
    from across the universe.
  </p>

</header>

<!-- ==========================================
     SEARCH & CONTROLS SECTION
     ========================================== -->

<section
  class="controls glass-card"
  aria-labelledby="search-heading">

  <!-- Section heading -->
  <h2 id="search-heading">
    Search NASA Media
  </h2>

  <!-- User instructions -->
  <p class="instruction">
    Select a date or explore a random NASA image.
  </p>

  <!-- Date picker and control buttons -->
  <div class="form-row">

    <!-- Date selection -->
    <label for="media-date">
      Select a Date
    </label>

    <input
      type="date"
      id="media-date"
      name="media-date">

    <!-- Fetch selected APOD -->
    <button
      id="fetch-btn"
      type="button">
      View NASA Media
    </button>

    <!-- Generate a random APOD date -->
    <button
      id="random-btn"
      type="button">
      Random Date
    </button>

    <!-- Toggle light/dark theme -->
    <button
      id="theme-toggle"
      type="button">
      Toggle Theme
    </button>

  </div>

  <!-- Loading indicator -->
  <div
    id="spinner"
    class="spinner"
    hidden>
    🚀 Loading NASA media...
  </div>

  <!-- Status and error messages -->
  <p
    id="status-message"
    class="status-message"
    aria-live="polite">
  </p>

</section>

<!-- ==========================================
     RESULTS SECTION
     ========================================== -->

<section
  class="results"
  aria-live="polite">

  <!-- NASA media card -->
  <article
    id="media-card"
    class="media-card glass-card"
    hidden>

    <!-- NASA title -->
    <h2 id="media-title"></h2>

    <!-- Media metadata -->
    <p
      id="media-date-display"
      class="media-date">
    </p>

    <p id="media-type"></p>

    <p id="media-copyright"></p>

    <!-- NASA image -->
    <img
      id="nasa-media"
      src=""
      alt="NASA Astronomy Picture of the Day"
      hidden>

    <!-- Message displayed when NASA returns video content -->
    <p
      id="video-message"
      class="video-message"
      hidden>
    </p>

    <!-- User action buttons -->
    <div class="action-row">

      <!-- Open/download NASA image -->
      <a
        id="download-btn"
        class="action-link"
        href="#"
        target="_blank"
        rel="noopener"
        hidden>
        Open / Download Image
      </a>

      <!-- Copy image URL -->
      <button
        id="share-btn"
        type="button"
        hidden>
        Copy Media Link
      </button>

      <!-- Save image to browser storage -->
      <button
        id="favorite-btn"
        type="button"
        hidden>
        Save Favorite
      </button>

      <!-- Load saved favorite -->
      <button
        id="view-favorite-btn"
        type="button">
        View Favorite
      </button>

    </div>

  </article>

  <!-- ==========================================
       EXPLANATION SECTION
       ========================================== -->

  <article
    id="explanation-card"
    class="text-block glass-card"
    hidden>

    <!-- Explanation heading -->
    <h2>Explanation</h2>

    <!-- NASA APOD explanation -->
    <p id="media-explanation"></p>

  </article>

</section>

<!-- ==========================================
     FOOTER
     ========================================== -->

<footer class="footer">

  <p>
    Powered by NASA Open APIs
  </p>

</footer>
```

  </main>

  <!-- Main JavaScript file -->

  <script src="js/main.js"></script>

</body>

</html>
