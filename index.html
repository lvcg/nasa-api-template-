<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore NASA's Astronomy Picture of the Day.">
  <meta name="keywords" content="NASA, APOD, Astronomy, Space, API">
  <title>NASA Astronomy Picture of the Day</title>
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>🚀 NASA Astronomy Picture of the Day</h1>
      <p class="intro">Explore NASA's daily featured images, videos, and stories from across the universe.</p>
    </header>

    <section class="controls">
      <p class="instruction">Select a date and click "View NASA Media".</p>
      <label for="media-date">Select a Date</label>
      <input type="date" id="media-date" name="media-date">
      <button id="fetch-btn" type="button">View NASA Media</button>
    </section>

    <section class="results">
      <h2 id="media-title"></h2>
      <p id="media-date-display"></p>

      <img id="nasa-media" src="" alt="NASA Astronomy Picture of the Day" hidden>

      <iframe id="nasa-video" title="NASA Video" src="" hidden allowfullscreen></iframe>

      <div class="text-block" id="explanation-card" hidden>
        <h3>Explanation</h3>
        <p id="media-explanation"></p>
      </div>
    </section>

    <footer>
      <p>Powered by NASA Open APIs</p>
    </footer>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
