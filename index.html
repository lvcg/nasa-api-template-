<!DOCTYPE html>

<html lang="en">
<head>
  <!-- Basic page setup -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO metadata -->

  <meta name="description" content="Explore NASA's Astronomy Picture of the Day using NASA's APOD API.">
  <meta name="keywords" content="NASA, APOD, Astronomy, Space, API, JavaScript">

  <!-- Browser tab title -->

  <title>NASA Astronomy Picture of the Day</title>

  <!-- Stylesheets -->

  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- Main app container -->
  <main class="container">


<!-- Hero section -->
<header class="hero glass-card">
  <h1>🚀 NASA Astronomy Picture of the Day</h1>
  <p class="intro">
    Explore NASA's daily featured images, videos, and stories from across the universe.
  </p>
</header>

<!-- Search and app controls -->
<section class="controls glass-card" aria-labelledby="search-heading">
  <h2 id="search-heading">Search NASA Media</h2>
  <p class="instruction">Select a date or explore a random NASA feature.</p>

  <!-- Date picker and primary buttons -->
  <div class="form-row">
    <label for="media-date">Select a Date</label>
    <input type="date" id="media-date" name="media-date">

    <button id="fetch-btn" type="button">View NASA Media</button>
    <button id="random-btn" type="button">Random Date</button>
    <button id="theme-toggle" type="button">Toggle Theme</button>
  </div>

  <!-- Loading spinner -->
  <div id="spinner" class="spinner" hidden>🚀 Loading NASA media...</div>

  <!-- Status and error messages -->
  <p id="status-message" class="status-message" aria-live="polite"></p>
</section>

<!-- API results section -->
<section class="results" aria-live="polite">

  <!-- Media card displays image/title/date/type/copyright -->
  <article id="media-card" class="media-card glass-card" hidden>
    <h2 id="media-title"></h2>

    <div class="meta-grid">
      <p id="media-date-display" class="media-date"></p>
      <p id="media-type"></p>
      <p id="media-copyright"></p>
    </div>

    <!-- NASA image renders here -->
    <img id="nasa-media" src="" alt="NASA Astronomy Picture of the Day" hidden>

    <!-- Message shown if NASA returns video content -->
    <p id="video-message" class="video-message" hidden></p>

    <!-- Action buttons shown after data loads -->
    <div class="action-row">
      <a id="download-btn" class="action-link" href="#" target="_blank" rel="noopener" hidden>
        Open / Download Image
      </a>

      <button id="share-btn" type="button" hidden>Copy Media Link</button>
      <button id="favorite-btn" type="button" hidden>Save Favorite</button>
      <button id="view-favorite-btn" type="button">View Favorite</button>
    </div>
  </article>

  <!-- Explanation card -->
  <article id="explanation-card" class="text-block glass-card" hidden>
    <h2>Explanation</h2>
    <p id="media-explanation"></p>
    
  </article>
</section>

<!-- Footer -->
<footer class="footer">
  <p>Powered by NASA Open APIs</p>
</footer>

  <!-- JavaScript file -->

  <script src="js/main.js"></script>

</body>
</html>
