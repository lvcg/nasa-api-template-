<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore NASA's Astronomy Picture of the Day.">
  <meta name="keywords" content="NASA, APOD, Astronomy, Space, API">
  <title>NASA Astronomy Picture of the Day</title>
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <header class="hero glass-card">
      <h1>🚀 NASA Astronomy Picture of the Day</h1>
      <p class="intro">Explore NASA's daily featured images, videos, and stories from across the universe.</p>
    </header>

    <section class="controls glass-card" aria-labelledby="search-heading">
      <h2 id="search-heading">Search NASA Media</h2>
      <p class="instruction">Select a date and click "View NASA Media".</p>

      <div class="form-row">
        <label for="media-date">Select a Date</label>
        <input type="date" id="media-date" name="media-date">
        <button id="fetch-btn" type="button">View NASA Media</button>
      </div>

      <p id="status-message" class="status-message" aria-live="polite"></p>
    </section>

    <section class="results" aria-live="polite">
      <article id="media-card" class="media-card glass-card" hidden>
        <h2 id="media-title"></h2>
        <p id="media-date-display" class="media-date"></p>
        <img id="nasa-media" src="" alt="NASA Astronomy Picture of the Day" hidden>
        <iframe id="nasa-video" title="NASA Video of the Day" src="" hidden allowfullscreen></iframe>
      </article>

      <article id="explanation-card" class="text-block glass-card" hidden>
        <h2>Explanation</h2>
        <p id="media-explanation"></p>
      </article>
    </section>

    <footer class="footer">
      <p>Powered by NASA Open APIs</p>
    </footer>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
