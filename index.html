<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="Explore NASA's Astronomy Picture of the Day">

    <title>NASA Astronomy Picture of the Day</title>

    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class="container">

        <header>
            <h1>🚀 NASA Astronomy Picture of the Day</h1>

            <p class="intro">
                Discover NASA's daily featured images, videos,
                and stories from across the universe.
            </p>
        </header>

        <section class="controls">

            <label for="media-date">
                Select a Date
            </label>

            <input
                type="date"
                id="media-date"
                name="media-date">

            <button
                type="button"
                id="fetch-btn">
                View NASA Media
            </button>

        </section>

        <section class="results">

            <div id="loading" hidden>
                Loading NASA Media...
            </div>

            <div id="error-message" hidden>
                Unable to load NASA media.
            </div>

            <h2 id="media-title"></h2>

            <p id="media-date-display"></p>

            <img
                id="nasa-media"
                src=""
                alt="NASA Astronomy Picture of the Day"
                style="display:none;">

            <iframe
                id="nasa-video"
                title="NASA Video"
                src=""
                style="display:none;"
                allowfullscreen>
            </iframe>

            <div class="text-block">

                <h3>Explanation</h3>

                <p id="media-explanation">
                    
                </p>

            </div>

        </section>

        <footer>
            <p>
                Powered by NASA Open APIs
            </p>
        </footer>

    </main>

    <script src="js/main.js"></script>

</body>
</html>
